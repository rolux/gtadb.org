<html>
    <head>
        <title>GTADB - Grand Theft Auto Database</title>
        <link rel="icon" href="index.png">
        <meta charset="utf-8"/>
        <meta name="description" content="GTADB hosts a collection of datasets from the world of Grand Theft Auto, and provides tools to visualize them. Home of gtamaplib and the GTA Landmarks Map."/>
        <meta property="og:title" content="GTADB - Grand Theft Auto Database"/>
        <meta property="og:description" content="GTADB hosts a collection of datasets from the world of Grand Theft Auto, and provides tools to visualize them. Home of gtamaplib and the GTA Landmarks Map."/>
        <meta property="og:image" content="https://gtadb.org/index.png"/>
        <meta property="og:url" content="https://gtadb.org"/>
        <meta property="og:type" content="website"/>
        <style>
            @font-face {
                font-family: 'Menlo';
                src: url('fonts/Menlo-Regular.ttf') format('truetype');
                font-weight: normal;
                font-style: normal;
            }
            body {
                align-items: center;
                background-image: url(images/PaletoBay.jpg);
                background-position: center;
                background-repeat: no-repeat;
                background-size: cover;
                font-family: sans-serif;
                font-size: 1em;
                height: 100vh;
                margin: 0;
            }
            a {
                color: white;
                text-decoration: none;
            }
            img {
                user-select: none;
                -webkit-user-drag: none;
            }
            div {
                user-select: none;
            }
            div#title {
                backdrop-filter: blur(4px);
                background: rgba(0, 0, 0, 0.25);
                border-radius: 12px;
                color: white;
                height: 100px;
                left: 16px;
                padding: 12px;
                position: absolute;
                top: 16px;
            }
            div#title div.title {
                font-family: Menlo;
                font-size: 12.8px;
                margin-top: -14px;
                margin-bottom: 24px;
                padding-left: 57px;
            }
            div.box {
                display: flex;
                flex-direction: row;
                gap: 16px;
                position: absolute;
            }
            div.box#map {
                bottom: 16px;
                flex-direction: column;
                left: 16px;
            }
            div.box#gtamaplib {
                right: 16px;
                top: 16px;
            }
            div.box#gtaguessr {
                bottom: 16px;
                left: 192px;
            }
            div.box#misc {
                bottom: 16px;
                right: 16px;
            }
            div.icon {
                align-items: center;
                display: flex;
                flex-direction: column;
                height: 96px;
                text-align: center;
                width: 160px;
            }
            div.icon img {
                background: rgba(0, 0, 0, 0.25);
                backdrop-filter: blur(4px);
                height: 64px;
                width: 64px;
            }
            div.icon div {
                backdrop-filter: blur(4px);
                background: rgba(0, 0, 0, 0.5);
                border-radius: 4px;
                color: white;
                font-size: 12px;
                margin-top: 8px;
                padding: 4px 8px;
            }
            div#dialogLayer {
                align-items: center;
                background: transparent;
                display: none;
                inset: 0;
                justify-content: center;
                position: fixed;
                z-index: 10;
            }
            div#dialogLayer.clicked {
                background: rgba(0, 0, 0, 0.25);
            }
            div.dialog {
                backdrop-filter: blur(4px);
                background: rgba(0, 0, 0, 0.25);
                border-radius: 12px;
                display: flex;
                flex-direction: column;
                height: 240px;
                width: 640px;
            }
            div.dialog .bar {
                align-items: center;
                background: rgba(0, 0, 0, 0.25);
                border-top-left-radius: 12px;
                border-top-right-radius: 12px;
                display: flex;
                height: 32px;
                justify-content: space-between;
            }
            div.dialog .title {
                color: white;
                font-size: 14px;
                font-weight: bold;
                margin-left: 12px;
            }
            div.dialog .close {
                color: white;
                cursor: pointer;
                font-size: 12px;
                margin-right: 12px;
            }
            div.dialog .content {
                align-items: center;
                display: flex;
                flex: 1;
                flex-direction: row;
                justify-content: center;
                gap: 16px;
            }
            div.dialog div.icon {
                height: auto;
            }
            div.dialog div.icon img {
                border-radius: 4px;
            }
            div.dialog div.icon div {
                background: rgba(0, 0, 0, 0.25);
            }
        </style>
    </head>
    <body>
        <div id="title">
            <img src="gtadb.png" alt="GTADB">
            <div class="title">Grand Theft Auto Database</div>
        </div>
        <div class="box" id="map">
            <div class="icon">
                <a href="https://map.gtadb.org/#IV">
                    <img src="images/GTA4.png" class="icon"/>
                </a>
                <a href="https://map.gtadb.org/#IV">
                    <div>GTA IV Landmarks Map</div>
                </a>
            </div>
            <div class="icon">
                <a href="https://map.gtadb.org/#V">
                    <img src="images/GTA5.png" class="icon"/>
                </a>
                <a href="https://map.gtadb.org/#V">
                    <div>GTA V Landmarks Map</div>
                </a>
            </div>
            <div class="icon">
                <a href="https://map.gtadb.org/#VI">
                    <img src="images/GTA6.png" class="icon"/>
                </a>
                <a href="https://map.gtadb.org/#VI">
                    <div>GTA VI Landmarks Map</div>
                </a>
            </div>
        </div>
        <div class="box" id="gtaguessr">
            <div class="icon">
                <a href="https://guess.gtadb.org">
                    <img src="images/gta6guessr.png" class="icon"/>
                </a>
                <a href="https://guess.gtadb.org">
                    <div>gta6guessr preview</div>
                </a>
            </div>
        </div>
        <div class="box" id="gtamaplib">
            <div class="icon">
                <a href="https://github.com/rolux/gtamaplib" target="_blank">
                    <img src="images/gtamaplib.png" class="icon"/>
                </a>
                <a href="https://github.com/rolux/gtamaplib" target="_blank">
                    <div>gtamaplib v0.1.0</div>
                </a>
            </div>
            <div class="icon">
                <a href="https://github.com/rolux/gtamaplib-vc" target="_blank">
                    <img src="images/gtamaplib-vc.png" class="icon"/>
                </a>
                <a href="https://github.com/rolux/gtamaplib-vc" target="_blank">
                    <div>gtamaplib-vc v0.1.0</div>
                </a>
            </div>
        </div>
        <div class="box" id="misc">
            <div class="icon">
                <a href="#files">
                    <img src="images/LosSantosElevationMap.png" class="icon"/>
                </a>
                <a href="#files">
                    <div>Files</div>
                </a>
            </div>
        </div>
        <div id="dialogLayer">
            <div class="dialog">
                <div class="bar">
                    <div class="title">Files</div>
                    <div class="close"><a href="#" onclick="history.replaceState(null, '', window.location.pathname); onHashchange(); return false;">CLOSE</a></div>
                </div>
                <div class="content">
                    <div class="icon">
                        <a href="files/LosSantosPopulationDensityMap.png">
                            <img src="images/LosSantosPopulationDensityMap.png" class="icon"/>
                        </a>
                        <a href="files/LosSantosPopulationDensityMap.png">
                            <div>Los Santos<br/>Population Density Map<br/>(Snapmatic 2014)</div>
                        </a>
                    </div>
                    <div class="icon">
                        <a href="files/LosSantosElevationMap.png">
                            <img src="images/LosSantosElevationMap.png" class="icon"/>
                        </a>
                        <a href="files/LosSantosElevationMap.png">
                            <div>Los Santos<br/>Elevation Map<br/>(Snapmatic 2014)</div>
                        </a>
                    </div>
                    <div class="icon">
                        <a href="files/LosSantosAreaMap.png">
                            <img src="images/LosSantosAreaMap.png" class="icon"/>
                        </a>
                        <a href="files/LosSantosAreaMap.png">
                            <div>Los Santos<br/>Area Map<br/>(Snapmatic 2014)</div>
                        </a>
                    </div>
                </div>
            </div>
        </div>
        <!--<div id="box">
            <p class="copyright">No Copyright ( ) 2026 GTADB.ORG. No rights reserved.</p>
        </div>-->
        <script>
            let dialogLayer = document.getElementById("dialogLayer")
            let timeout
            dialogLayer.addEventListener("mousedown", function(e) {
                if (e.target.id == "dialogLayer") {
                    dialogLayer.classList.add("clicked")
                    e.stopPropagation()
                }
            })
            dialogLayer.addEventListener("mouseup", function() {
                dialogLayer.classList.remove("clicked")
            })
            window.addEventListener("hashchange", onHashchange)
            function onHashchange() {
                dialogLayer.style.display = window.location.hash == "#files" ? "flex" : "none"
            }
            onHashchange()
        </script>
    </body>
</html>
