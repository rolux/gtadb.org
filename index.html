<html>
    <head>
        <title>GTADB - Grand Theft Auto Database</title>
        <link rel="icon" href="index.png">
        <style>
            @font-face {
                font-family: 'Menlo';
                src: url('fonts/Menlo-Regular.ttf') format('truetype');
                font-weight: normal;
                font-style: normal;
            }
            body {
                align-items: center;
                background-image: url(images/PaletoBay.jpg);
                background-position: center;
                background-repeat: no-repeat;
                background-size: cover;
                font-family: sans-serif;
                font-size: 1em;
                height: 100vh;
                margin: 0;
            }
            img {
                -webkit-user-drag: none;
            }
            div#title {
                backdrop-filter: blur(4px);
                background: rgba(0, 0, 0, 0.25);
                border-radius: 12px;
                color: white;
                height: 100px;
                left: 16px;
                padding: 12px;
                position: absolute;
                top: 16px;
            }
            div.title {
                font-family: Menlo;
                font-size: 12.8px;
                margin-top: -14px;
                margin-bottom: 24px;
                padding-left: 57px;
            }
            div#desktop {
                align-content: flex-end;   /* right */
                display: flex;
                flex-direction: row;
                flex-wrap: wrap;
                gap: 16px;
                inset: 0;
                justify-content: flex-end; /* bottom */
                padding: 32px;
                position: absolute;
                top: 16px;
                bottom: 16px;
                right: 16px;
                left: 16px;
            }
            div.icon {
                align-items: center;
                display: flex;
                flex-direction: column;
                text-align: center;
                width: 160px;
            }
            div.icon img {
                background: rgba(0, 0, 0, 0.5);
                backdrop-filter: blur(4px);
                height: 64px;
                width: 64px;
            }
            div.icon div {
                backdrop-filter: blur(4px);
                background: rgba(0, 0, 0, 0.5);
                border-radius: 4px;
                color: white;
                font-size: 12px;
                margin-top: 8px;
                padding: 4px 8px;
            }
        </style>
    </head>
    <body>
        <div id="title">
            <img src="gtadb.png" alt="GTADB">
            <div class="title">Grand Theft Auto Database</div>
        </div>
        <div id="desktop">
            <div class="icon">
                <a href="https://map.gtadb.org/#IV">
                    <img src="images/GTA4.png" class="icon"/>
                </a>
                <a href="https://map.gtadb.org/#IV">
                    <div>GTA IV Landmarks Map</div>
                </a>
            </div>
            <div class="icon">
                <a href="https://map.gtadb.org/#V">
                    <img src="images/GTA5.png" class="icon"/>
                </a>
                <a href="https://map.gtadb.org/#V">
                    <div>GTA V Landmarks Map</div>
                </a>
            </div>
            <div class="icon">
                <a href="https://map.gtadb.org/#VI">
                    <img src="images/GTA6.png" class="icon"/>
                </a>
                <a href="https://map.gtadb.org/#VI">
                    <div>GTA VI Landmarks Map</div>
                </a>
            </div>
            <div class="icon">
                <a href="https:/guess.gtadb.org">
                    <img src="images/gta6guessr.png" class="icon"/>
                </a>
                <a href="https:/guess.gtadb.org">
                    <div>gta6guessr preview</div>
                </a>
            </div>
            <div class="icon">
                <a href="https://github.com/rolux/gtamaplib">
                    <img src="images/gtamaplib.png" class="icon"/>
                </a>
                <a href="https://github.com/rolux/gtamaplib">
                    <div>gtamaplib v0.1.0</div>
                </a>
            </div>
            <div class="icon">
                <a href="https://github.com/rolux/gtamaplib-vc">
                    <img src="images/gtamaplib-vc.png" class="icon"/>
                </a>
                <a href="https://github.com/rolux/gtamaplib-vc">
                    <div>gtamaplib-vc v0.1.0</div>
                </a>
            </div>
        </div>
        <!--<div id="box">
            <p class="copyright">No Copyright ( ) 2026 GTADB.ORG. No rights reserved.</p>
        </div>-->
    </body>
</html>
